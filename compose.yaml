services:
  bookstack_db:
    image: mysql:8.0
    container_name: bookstack_db
    environment:
      - MYSQL_ROOT_PASSWORD=supersecret
      - MYSQL_DATABASE=bookstackdb
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=supersecret
    volumes:
      - ./resources/bookstack_db:/var/lib/mysql
    ports:
      - "3307:3306"
    restart: unless-stopped

  bookstack_app:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack_app
    depends_on:
      - bookstack_db
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_DATABASE=bookstackdb
      - DB_USERNAME=admin
      - DB_PASSWORD=supersecret
      - APP_URL=http://localhost:8080
      - APP_KEY=base64:Gnka9bDDBnDrJmeBn7OgE5iJ4Y//sBUkfGgyBDWoYeQ=
    volumes:
      - ./resources/bookstack:/config
    ports:
      - "8080:80"
    restart: unless-stopped

  fathom_postgres:
    image: postgres:12
    container_name: fathom_postgres
    environment:
      - POSTGRES_DB=fathom
      - POSTGRES_USER=fathom
      - POSTGRES_PASSWORD=supersecret
    volumes:
      - ./resources/fathom_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  fathom:
    image: usefathom/fathom:latest
    container_name: fathom
    depends_on:
      - fathom_postgres
    environment:
      - FATHOM_SERVER_ADDR=:8080
      - FATHOM_DATABASE_DRIVER=postgres
      - FATHOM_DATABASE_HOST=fathom_postgres
      - FATHOM_DATABASE_NAME=fathom
      - FATHOM_DATABASE_USER=fathom
      - FATHOM_DATABASE_PASSWORD=supersecret
      - FATHOM_DATABASE_SSLMODE=disable
      - FATHOM_SECRET_KEY=REPLACE_WITH_RANDOM_SECRET
    volumes:
      - ./resources/fathom:/var/lib/fathom
    ports:
      - "8081:8080"
    restart: unless-stopped